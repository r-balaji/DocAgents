<template>
    <lightning-input
        type="checkbox"
        label="Include Other documents"
        checked={includeFallbackCategory}
        disabled={isBusy}
        onchange={handleIncludeFallbackChange}>
    </lightning-input>
    <lightning-button-group>
        <lightning-button
            label={reviewButtonLabel}
            variant={buttonVariant}
            icon-name="utility:einstein"
            disabled={isBusy}
            onclick={handleClick}>
        </lightning-button>
        <lightning-button
            label={clearButtonLabel}
            variant="destructive-text"
            icon-name="utility:delete"
            disabled={isBusy}
            onclick={handleClearReview}>
        </lightning-button>
    </lightning-button-group>

    <template lwc:if={showModal}>
        <section role="dialog" tabindex="-1" aria-labelledby="aidoc1-modal-heading" aria-modal="true"
                 class="slds-modal slds-fade-in-open slds-modal_large">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close"
                            title="Close" onclick={handleClose}>
                        <lightning-icon icon-name="utility:close" alternative-text="Close" size="small"
                                        variant="inverse"></lightning-icon>
                    </button>
                    <h2 id="aidoc1-modal-heading" class="slds-modal__title slds-hyphenate">AI Document Review</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium" style="min-height:300px;">
                    <template lwc:if={showCachedReview}>
                        <c-ai-document-review
                            coverage-json={cachedCoverageJson}
                            classification-json={cachedClassificationJson}
                            sanity-json={cachedSanityJson}
                            onfinish={handleClose}>
                        </c-ai-document-review>
                    </template>
                    <template lwc:elseif={showFlow}>
                        <lightning-flow
                            flow-api-name={flowApiName}
                            flow-input-variables={flowInputVariables}
                            onstatuschange={handleFlowStatusChange}>
                        </lightning-flow>
                    </template>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
    </template>
</template>
