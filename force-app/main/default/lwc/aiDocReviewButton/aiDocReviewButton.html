<template>
    <lightning-button
        label={buttonLabel}
        variant={buttonVariant}
        icon-name="utility:einstein"
        onclick={handleClick}>
    </lightning-button>

    <template lwc:if={showFlow}>
        <section role="dialog" tabindex="-1" aria-labelledby="aidoc1-modal-heading" aria-modal="true"
                 class="slds-modal slds-fade-in-open slds-modal_large">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                            title="Close" onclick={handleClose}>
                        <lightning-icon icon-name="utility:close" alternative-text="Close" size="small"
                                        variant="inverse"></lightning-icon>
                    </button>
                    <h2 id="aidoc1-modal-heading" class="slds-modal__title slds-hyphenate">AI Document Review</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium" style="min-height:300px;">
                    <lightning-flow
                        flow-api-name={flowApiName}
                        flow-input-variables={flowInputVariables}
                        onstatuschange={handleFlowStatusChange}>
                    </lightning-flow>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
    </template>
</template>
