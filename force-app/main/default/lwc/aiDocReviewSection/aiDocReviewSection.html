<template>
    <article class="slds-card review-card">
        <header class="review-header">
            <div class="review-header__identity">
                <span class="header-icon-wrap">
                    <lightning-icon
                        icon-name="utility:einstein"
                        size="x-small"
                        variant="inverse"
                        alternative-text="AI document review">
                    </lightning-icon>
                </span>
                <div class="review-header__copy">
                    <h2 class="review-title">Document Review</h2>
                    <div class="review-summary">
                        <span class={emailStatusClass}>{emailStatusLabel}</span>
                        <template lwc:if={hasEmail}>
                            <span class="review-subject" title={subject}>{subject}</span>
                        </template>
                    </div>
                </div>
            </div>
            <div class="review-header__actions">
                <lightning-button-icon
                    icon-name="utility:upload"
                    alternative-text="Upload Application Document"
                    tooltip="Upload Application Document"
                    variant="border-filled"
                    disabled={isStartingIntake}
                    onclick={handleOpenUpload}>
                </lightning-button-icon>
                <lightning-button-icon
                    icon-name={toggleIconName}
                    alternative-text={toggleTitle}
                    tooltip={toggleTitle}
                    variant="bare"
                    aria-expanded={isExpanded}
                    aria-controls="document-review-content"
                    onclick={handleToggle}>
                </lightning-button-icon>
            </div>
        </header>

        <template lwc:if={isExpanded}>
            <div id="document-review-content" class="review-content">
                <div class="email-summary">
                    <span class="email-summary__icon">
                        <lightning-icon icon-name="utility:email" size="x-small" alternative-text="Borrower email"></lightning-icon>
                    </span>
                    <div class="email-summary__copy">
                        <p class="email-summary__label">Borrower email</p>
                        <template lwc:if={hasEmail}>
                            <p class="email-summary__subject" title={subject}>{subject}</p>
                            <p class="email-summary__preview">{previewText}</p>
                        </template>
                        <template lwc:else>
                            <p class="email-summary__empty">No draft available</p>
                        </template>
                    </div>
                    <div class="email-summary__actions">
                        <lightning-button-icon
                            icon-name="utility:expand"
                            alternative-text="Show full email"
                            tooltip="Show full email"
                            variant="border-filled"
                            disabled={hasEmailDisabled}
                            onclick={handleShowFull}>
                        </lightning-button-icon>
                        <lightning-button-icon
                            icon-name="utility:copy"
                            alternative-text="Copy email template"
                            tooltip="Copy email template"
                            variant="border-filled"
                            disabled={hasEmailDisabled}
                            onclick={handleCopy}>
                        </lightning-button-icon>
                    </div>
                </div>

                <div class="review-controls">
                    <c-ai-doc-review-button
                        compact
                        button-label="Review Documents"
                        record-id={recordId}
                        onstatuschange={handleFlowFinished}>
                    </c-ai-doc-review-button>
                    <c-ai-doc-category-file-manager
                        class="category-file-action"
                        record-id={recordId}
                        oncategoryfilescleared={handleFlowFinished}>
                    </c-ai-doc-category-file-manager>
                </div>
            </div>
        </template>
    </article>

    <!-- Full email modal — styled as a real email client view -->
    <template lwc:if={showFullModal}>
        <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="email-modal-heading"
                 class="slds-modal slds-fade-in-open slds-modal_medium">
            <div class="slds-modal__container modal-shell">
                <header class="slds-modal__header modal-header">
                    <button class="slds-button slds-button_icon slds-modal__close"
                            title="Close" onclick={handleCloseModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="Close"
                                        size="small" variant="inverse"></lightning-icon>
                    </button>
                    <div class="modal-header__title-wrap">
                        <lightning-icon icon-name="utility:email" size="small" variant="inverse" class="slds-m-right_small"></lightning-icon>
                        <div>
                            <h2 id="email-modal-heading" class="slds-modal__title">Draft Borrower Email</h2>
                            <p class="modal-header__sub">AI-drafted. Review before sending.</p>
                        </div>
                    </div>
                </header>

                <div class="slds-modal__content modal-body">
                    <!-- Email metadata band -->
                    <div class="email-meta">
                        <div class="meta-row">
                            <span class="meta-label">Subject</span>
                            <span class="meta-value meta-value_subject">{subject}</span>
                        </div>
                        <template lwc:if={toAddress}>
                            <div class="meta-row">
                                <span class="meta-label">To</span>
                                <span class="meta-value">{toAddress}</span>
                            </div>
                        </template>
                        <div class="meta-row">
                            <span class="meta-label">From</span>
                            <span class="meta-value meta-value_muted">Your Loan Officer</span>
                        </div>
                    </div>

                    <!-- Formatted body -->
                    <div class="email-body">
                        <template for:each={bodyParagraphs} for:item="para">
                            <p key={para.key} class="email-para">{para.text}</p>
                        </template>
                    </div>
                </div>

                <footer class="slds-modal__footer modal-footer">
                    <lightning-button
                        label="Copy Email"
                        icon-name="utility:copy"
                        variant="brand"
                        onclick={handleCopy}>
                    </lightning-button>
                    <lightning-button
                        label="Close"
                        onclick={handleCloseModal}
                        class="slds-m-left_x-small">
                    </lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
    </template>

    <template lwc:if={showUploadModal}>
        <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="upload-modal-heading"
                 class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container upload-modal-shell">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close"
                            title="Close" disabled={isStartingIntake} onclick={handleCloseUpload}>
                        <lightning-icon icon-name="utility:close" alternative-text="Close"
                                        size="small" variant="inverse"></lightning-icon>
                    </button>
                    <h2 id="upload-modal-heading" class="slds-modal__title slds-hyphenate">
                        Upload Application Document
                    </h2>
                </header>
                <div class="slds-modal__content slds-p-around_large upload-modal-body">
                    <template lwc:if={isStartingIntake}>
                        <lightning-spinner alternative-text="Starting document intake" size="medium"></lightning-spinner>
                    </template>
                    <lightning-file-upload
                        label="Select a PDF document"
                        name="applicationDocument"
                        accept={acceptedUploadFormats}
                        record-id={recordId}
                        disabled={isStartingIntake}
                        onuploadfinished={handleUploadFinished}>
                    </lightning-file-upload>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button
                        label="Cancel"
                        disabled={isStartingIntake}
                        onclick={handleCloseUpload}>
                    </lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
    </template>
</template>
